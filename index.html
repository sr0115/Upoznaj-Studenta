<!DOCTYPE html>

<html lang="sr">

  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>Login</title>
  </head>

  <body>
    <h1>Prijava</h1>

    <!-- Forma za login -->
    <form id="loginForm">
      
      <label for="email">Studentski email</label><br />

      <input
        type="email"
        id="email"
        placeholder="ipXXXXYYYY@student.fon.bg.ac.rs"
        required
      /><br /><br />

      <label for="password">Šifra</label><br />

      <input
        type="password"
        id="password"
        placeholder="Unesite šifru"
        required
      /><br /><br />

      <!-- Dugme za prijavljivanje -->
      <button type="submit">Prijavi se</button>
    </form>

    <p id="errorMessage"></p>
    <hr />

<p>Nemaš nalog? <a href="register.html">Registruj se</a></p>


    <script src="js/login.js"></script>
    
  </body>
</html>
