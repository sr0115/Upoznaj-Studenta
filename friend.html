<!DOCTYPE html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <title>Profil prijatelja</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Profil prijatelja -->
    <h1>Profil prijatelja</h1>

    <p><strong>Email:</strong> <span id="friendEmail"></span></p>
    
    <p><strong>Ime i prezime:</strong> <span id="friendName">Nije uneto</span></p>
    <p><strong>Opis:</strong> <span id="friendDesc">Nema opisa</span></p>

    <hr />

    <!-- Dugme za dodavanje prijatelja -->
    <button id="addFriendBtn">Dodaj prijatelja</button>


    <!-- CV prijatelja -->
    <p><strong>CV (PDF):</strong></p>
    <button id="openFriendCvBtn" disabled>Otvori CV</button>

    <hr />

    <!-- Nazad -->
    <button onclick="goBack()">Nazad</button>

    <script src="js/friend.js"></script>
  </body>
</html>
